name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npx tsc
        
      - name: Build iOS plugin
        run: |
          cd ios
          xcodebuild -scheme DiagnosticPlugin -sdk iphonesimulator build
      
