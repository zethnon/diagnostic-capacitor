name: iOS Build (Xcode)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Generate Xcode project (SwiftPM)
        run: |
          cd ios
          swift package generate-xcodeproj

      - name: Build iOS (Simulator)
        run: |
          cd ios
          xcodebuild \
            -project NoesisDiagnosticCapacitor.xcodeproj \
            -scheme NoesisDiagnosticCapacitor \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build
