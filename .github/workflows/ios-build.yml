name: iOS Build + Simulator Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -----------------------
      # 1) Plugin (diagnostic-capacitor/)
      # -----------------------
      - name: Install plugin deps
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-capacitor
          npm ci

      - name: Typecheck plugin
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-capacitor
          npx tsc -p tsconfig.json --noEmit

      - name: Build iOS plugin (SwiftPM via Xcode)
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-capacitor

          xcodebuild -version
          xcodebuild -list

          xcodebuild \
            -scheme NoesisDiagnosticCapacitor \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

      # -----------------------
      # 2) Test app (diagnostic-cap-test/)
      # -----------------------
      - name: Install test app deps
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-cap-test
          npm ci

      - name: Build test app web assets
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-cap-test
          npm run build

      - name: Capacitor sync (iOS)
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-cap-test
          npx cap sync ios

      - name: List iOS app schemes (debug)
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-cap-test/ios/App
          xcodebuild -list

      - name: Run iOS UI tests (Simulator)
        shell: bash
        run: |
          set -euo pipefail
          cd diagnostic-cap-test/ios/App

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            test
