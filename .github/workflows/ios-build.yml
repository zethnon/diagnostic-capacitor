name: iOS Swift Package Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Swift build (plugin)
        run: |
          cd ios
          swift --version
          swift build -v

      - name: Swift test (plugin)
        run: |
          cd ios
          swift test -v
